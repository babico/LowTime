name: Default PR Routing

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign-and-request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Assign default owner and request Codex review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pull_number,
              assignees: ["babico"],
            });

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ["codex"],
              });
            } catch (error) {
              core.warning(`Could not request codex reviewer automatically: ${error.message}`);
            }
